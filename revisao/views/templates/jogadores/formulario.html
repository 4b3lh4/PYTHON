{% extends "layout.html" %}

{% block title %}{% if jogador %}Editar Jogador{% else %}Novo Jogador{% endif %}{% endblock %}

{% block content %}
    <h1>{% if jogador %}Editar Jogador{% else %}Novo Jogador{% endif %}</h1>
    
    <form method="POST">
        <div class="form-grupo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" value="{{ jogador.nome if jogador else '' }}" required>
        </div>
        
        <div class="form-grupo">
            <label for="posicao">Posição</label>
            <select id="posicao" name="posicao" required>
                <option value="">Selecione...</option>
                {% for p in ["Goleiro", "Defensor", "Meio-campista", "Atacante"] %}
                    <option value="{{ p }}" {{ 'selected' if jogador and jogador.posicao == p else '' }}>{{ p }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-grupo">
            <label for="clube">Clube</label>
            <input type="text" id="clube" name="clube" value="{{ jogador.clube if jogador else '' }}" required>
        </div>
        
        <div class="form-grupo">
            <label for="cabeceio">Cabeceio</label>
            <input type="number" id="cabeceio" name="cabeceio" min="1" max="10" value="{{ jogador.cabeceio if jogador else '' }}" required>
        </div>
        
        <div class="form-grupo">
            <label for="forca">Força</label>
            <input type="number" id="forca" name="forca" min="1" max="10" value="{{ jogador.forca if jogador else '' }}" required>
        </div>
        
        <button type="submit">{% if jogador %}Atualizar{% else %}Salvar{% endif %}</button>
    </form>
    
    <p><a href="{{ url_for('jogador.index') }}">← Voltar</a></p>
{% endblock %}
